{% extends "frontend/base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
        <h2 class="text-3xl font-bold mb-2">Login</h2>
        <p class="text-slate-600 mb-6">Sign in to access Smart Inventory.</p>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <div>
                <label class="block text-sm font-medium mb-2">Username</label>
                <input type="text" name="username"
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-900"
                       required>
            </div>

            <div>
                <label class="block text-sm font-medium mb-2">Password</label>
                <input type="password" name="password"
                       class="w-full px-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-900"
                       required>
            </div>

            {% if error %}
            <p class="text-red-600 text-sm font-medium">{{ error }}</p>
            {% endif %}

            <button type="submit"
                    class="w-full bg-slate-900 text-white py-3 rounded-lg font-semibold hover:bg-slate-800 transition">
                Login
            </button>
        </form>
    </div>
</div>
{% endblock %}
